name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: trust_console
          POSTGRES_USER: trust_console
          POSTGRES_PASSWORD: trust_console
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U trust_console -d trust_console"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      CI: true
      DATABASE_URL: postgresql://trust_console:trust_console@localhost:5432/trust_console?schema=public
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Push schema
        run: npm run db:push

      - name: Seed database
        run: npm run db:seed

      - name: Typecheck
        run: npm run typecheck

      - name: Run unit and integration tests
        run: npm run test

      - name: Build application
        run: npm run build

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run end-to-end tests
        run: npm run test:e2e
